<div class="modal fade" id="logCallModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="logCallForm" method="post">
                {% csrf_token %}
                <div class="modal-header">
                    <h5 class="modal-title">Log call</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Outcome</label>
                        <select name="outcome" class="form-select" required>
                            {% for v,l in call_outcomes %}<option value="{{ v }}">{{ l }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-semibold">Duration (seconds)</label>
                            <input type="number" min="0" name="duration_seconds" class="form-control" value="0">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-semibold">Next follow-up</label>
                            <input type="datetime-local" name="next_follow_up" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3 mt-3">
                        <label class="form-label small fw-semibold">Update assignment status (optional)</label>
                        <select name="assignment_status" class="form-select">
                            <option value="">— No change —</option>
                            {% for v,l in assignment_statuses %}<option value="{{ v }}">{{ l }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="mb-1">
                        <label class="form-label small fw-semibold">Notes</label>
                        <textarea name="notes" class="form-control" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-link text-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>
