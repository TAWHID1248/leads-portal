{% for field in form %}
<div class="mb-3">
    <label for="{{ field.id_for_label }}" class="form-label small fw-semibold mb-1">{{ field.label }}</label>
    {{ field }}
    {% if field.help_text %}<div class="form-text small">{{ field.help_text }}</div>{% endif %}
    {% for err in field.errors %}<div class="text-danger small mt-1">{{ err }}</div>{% endfor %}
</div>
{% endfor %}
{% if form.non_field_errors %}
<div class="alert alert-danger small">{{ form.non_field_errors }}</div>
{% endif %}
