{% load portal_tags %}
<form id="leadsFilterForm"
      class="card p-3 mb-3"
      style="position: sticky; top: 60px; z-index: 1010;"
      hx-get="{% if list_url %}{{ list_url }}{% else %}{% url 'super_admin:leads_list' %}{% endif %}"
      hx-target="#leads-table"
      hx-swap="innerHTML"
      hx-push-url="true"
      hx-trigger="change, input changed delay:300ms from:input[name='search']">
    <div class="row g-2 align-items-end">
        <div class="col-md-3">
            <label class="form-label small fw-semibold mb-1">Search</label>
            <input type="text" name="search" value="{{ request.GET.search|default:'' }}"
                   class="form-control form-control-sm"
                   placeholder="Name, email, or phone">
        </div>
        <div class="col-md-2">
            <label class="form-label small fw-semibold mb-1">Status</label>
            {{ filter.form.status }}
        </div>
        <div class="col-md-2">
            <label class="form-label small fw-semibold mb-1">Source</label>
            {{ filter.form.source_type }}
        </div>
        <div class="col-md-1">
            <label class="form-label small fw-semibold mb-1">State</label>
            {{ filter.form.state }}
        </div>
        <div class="col-md-1">
            <label class="form-label small fw-semibold mb-1">Qual ≥</label>
            {{ filter.form.quality_min }}
        </div>
        <div class="col-md-1">
            <label class="form-label small fw-semibold mb-1">Qual ≤</label>
            {{ filter.form.quality_max }}
        </div>
        <div class="col-md-2 d-flex gap-2">
            <a href="{% if list_url %}{{ list_url }}{% else %}{% url 'super_admin:leads_list' %}{% endif %}" class="btn btn-sm btn-outline-secondary w-100">Clear</a>
        </div>
    </div>
    <div class="row g-2 align-items-end mt-1">
        <div class="col-md-3">
            <label class="form-label small fw-semibold mb-1">Niche</label>
            {{ filter.form.niche }}
        </div>
        <div class="col-md-2">
            <label class="form-label small fw-semibold mb-1">Created from</label>
            {{ filter.form.created_from }}
        </div>
        <div class="col-md-2">
            <label class="form-label small fw-semibold mb-1">Created to</label>
            {{ filter.form.created_to }}
        </div>
    </div>
</form>
