{% load portal_tags %}
<div class="modal fade" id="assignModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="assignForm" method="post"
                  hx-on::after-request="window.portalLeads.handleAssignResponse(event)">
                {% csrf_token %}
                <div class="modal-header">
                    <h5 class="modal-title">Assign lead<span id="assignBulkCount"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="lead_id" id="assignLeadId">
                    <div id="assignBulkIds"></div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Client</label>
                        <select name="client_id" class="form-select" required>
                            <option value="">Select a client…</option>
                            {% for c in clients %}
                            <option value="{{ c.id }}"
                                    data-default-price="">
                                {{ c.company_name }} <small class="text-muted">({{ c.user.email }})</small>
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Price per lead ($)</label>
                        <input type="number" step="0.01" min="0" name="price_per_lead" class="form-control" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-link text-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Confirm assignment</button>
                </div>
            </form>
        </div>
    </div>
</div>
