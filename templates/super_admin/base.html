{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<style>
:root {
    --portal-primary:      #F97316;
    --portal-primary-dark: #EA580C;
    --portal-primary-hover:#EA580C;
    --portal-primary-light:#FFF7ED;
    --portal-primary-soft: #FFF7ED;
    --portal-primary-alpha:rgba(249,115,22,0.12);
    --portal-primary-glow: 0 4px 14px rgba(249,115,22,0.28);
}
</style>
{% endblock %}

{% block sidebar %}
<div class="sidebar-section">Main</div>
<a href="/super/dashboard/" class="sidebar-link{% if request.path == '/super/dashboard/' %} active{% endif %}">
    <i class="bi bi-speedometer2"></i><span>Dashboard</span>
</a>
<a href="/super/leads/" class="sidebar-link{% if request.path == '/super/leads/' %} active{% endif %}">
    <i class="bi bi-funnel"></i><span>Leads</span>
</a>
<a href="/super/leads/sweepstakes/" class="sidebar-link sidebar-sublink{% if '/super/leads/sweepstakes/' in request.path %} active{% endif %}">
    <i class="bi bi-gift"></i><span>Sweepstakes</span>
</a>
<a href="/super/leads/solar/" class="sidebar-link sidebar-sublink{% if '/super/leads/solar/' in request.path %} active{% endif %}">
    <i class="bi bi-sun"></i><span>Solar</span>
</a>
<a href="/super/leads/homeowner/" class="sidebar-link sidebar-sublink{% if '/super/leads/homeowner/' in request.path %} active{% endif %}">
    <i class="bi bi-house"></i><span>Homeowner</span>
</a>
<a href="/super/leads/payday/" class="sidebar-link sidebar-sublink{% if '/super/leads/payday/' in request.path %} active{% endif %}">
    <i class="bi bi-cash-coin"></i><span>Payday</span>
</a>
<a href="/super/clients/" class="sidebar-link{% if '/super/clients/' in request.path %} active{% endif %}">
    <i class="bi bi-briefcase"></i><span>Clients</span>
</a>
<a href="/super/agents/" class="sidebar-link{% if '/super/agents/' in request.path %} active{% endif %}">
    <i class="bi bi-person-badge"></i><span>Agents</span>
</a>
<a href="/super/users/" class="sidebar-link{% if '/super/users/' in request.path %} active{% endif %}">
    <i class="bi bi-people"></i><span>Users</span>
</a>

<div class="sidebar-section">Operations</div>
<a href="/super/replacements/" class="sidebar-link{% if '/super/replacements/' in request.path %} active{% endif %}">
    <i class="bi bi-arrow-repeat"></i><span>Replacements</span>
</a>
<a href="/super/sweepstakes/" class="sidebar-link{% if '/super/sweepstakes/' in request.path %} active{% endif %}">
    <i class="bi bi-gift"></i><span>Sweepstakes</span>
</a>
<a href="/super/billing/" class="sidebar-link{% if '/super/billing/' in request.path %} active{% endif %}">
    <i class="bi bi-receipt"></i><span>Billing</span>
</a>

<div class="sidebar-section">System</div>
<a href="/super/settings/" class="sidebar-link{% if '/super/settings/' in request.path %} active{% endif %}">
    <i class="bi bi-gear"></i><span>Settings</span>
</a>
{% endblock %}
