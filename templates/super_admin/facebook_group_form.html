{% extends 'super_admin/base.html' %}
{% block title %}{{ page_title }} | LeadPortal{% endblock %}
{% block content %}
<div class="d-flex align-items-center gap-3 mb-4">
    <a href="{% url 'super_admin:facebook_groups' %}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
    <h1 class="page-title mb-0">{{ page_title }}</h1>
</div>
<div class="card" style="max-width:800px;">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label fw-semibold">Group Name <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control" value="{{ group.name|default:'' }}" required>
                </div>
                <div class="col-md-8">
                    <label class="form-label fw-semibold">Group URL</label>
                    <input type="url" name="group_url" class="form-control" value="{{ group.group_url|default:'' }}" placeholder="https://facebook.com/groups/...">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Type</label>
                    <select name="group_type" class="form-select">
                        {% for val, label in type_choices %}
                        <option value="{{ val }}" {% if group and group.group_type == val %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Members</label>
                    <input type="number" name="members" class="form-control" min="0" value="{{ group.members|default:0 }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Quality</label>
                    <select name="quality" class="form-select">
                        {% for val, label in quality_choices %}
                        <option value="{{ val }}" {% if group and group.quality == val %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Status</label>
                    <div class="form-check form-switch mt-2">
                        <input class="form-check-input" type="checkbox" name="is_active" id="isActive" {% if not group or group.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="isActive">Active</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Owner Name</label>
                    <input type="text" name="owner_name" class="form-control" value="{{ group.owner_name|default:'' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Owner Facebook URL</label>
                    <input type="url" name="owner_url" class="form-control" value="{{ group.owner_url|default:'' }}" placeholder="https://facebook.com/...">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">1st Admin</label>
                    <input type="text" name="admin_1" class="form-control" value="{{ group.admin_1|default:'' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">2nd Admin</label>
                    <input type="text" name="admin_2" class="form-control" value="{{ group.admin_2|default:'' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">3rd Admin</label>
                    <input type="text" name="admin_3" class="form-control" value="{{ group.admin_3|default:'' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Agent Name(s)</label>
                    <input type="text" name="agent_name" class="form-control" value="{{ group.agent_name|default:'' }}" placeholder="e.g. Nabil, Iram">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Backup Group URL</label>
                    <input type="url" name="backup_url" class="form-control" value="{{ group.backup_url|default:'' }}" placeholder="https://facebook.com/groups/...">
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>{% if group %}Save Changes{% else %}Add Group{% endif %}</button>
                <a href="{% url 'super_admin:facebook_groups' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
