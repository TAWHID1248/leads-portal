{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LeadPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/portal.css' %}">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh;">
<div class="card shadow-sm" style="width:100%;max-width:420px;">
    <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
            <h4 class="fw-bold mb-1" style="color:var(--portal-primary);">LeadPortal</h4>
            <p class="text-muted small mb-0">Sign in to your account</p>
        </div>

        {% if error %}
        <div class="alert alert-danger py-2 small mb-3">{{ error }}</div>
        {% endif %}

        <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small fw-semibold mb-1">Email address</label>
                <input type="email" name="email"
                       class="form-control{% if form.email.errors %} is-invalid{% endif %}"
                       value="{{ form.email.value|default:'' }}"
                       placeholder="you@example.com"
                       autocomplete="email" autofocus>
                {% for err in form.email.errors %}
                <div class="invalid-feedback">{{ err }}</div>
                {% endfor %}
            </div>

            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label class="form-label small fw-semibold mb-0">Password</label>
                    <a href="/forgot-password/" class="small text-decoration-none" style="color:var(--portal-primary);">
                        Forgot password?
                    </a>
                </div>
                <input type="password" name="password"
                       class="form-control{% if form.password.errors %} is-invalid{% endif %}"
                       placeholder="••••••••"
                       autocomplete="current-password">
                {% for err in form.password.errors %}
                <div class="invalid-feedback">{{ err }}</div>
                {% endfor %}
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-semibold">Sign In</button>
        </form>
    </div>
</div>
</body>
</html>
