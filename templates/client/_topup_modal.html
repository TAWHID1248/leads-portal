{% load portal_tags %}
<div class="modal fade" id="topupModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Top up wallet</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                {% if not stripe_configured %}
                <div class="alert alert-warning small">
                    Stripe isn't configured (missing <code>STRIPE_PUBLIC_KEY</code> / <code>STRIPE_SECRET_KEY</code>).
                    Set them in <code>.env</code> and restart the server to enable card top-ups.
                </div>
                {% endif %}
                <form id="topupForm" {% if not stripe_configured %}aria-disabled="true"{% endif %}>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Amount (USD)</label>
                        <input type="number" step="0.01" min="1" id="topupAmount" class="form-control" placeholder="100.00" required>
                    </div>
                    <div id="payment-element" class="mb-3"></div>
                    <div id="topupMessage" class="small text-danger"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-link text-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" id="topupSubmit" class="btn btn-primary" {% if not stripe_configured %}disabled{% endif %}>
                    Pay
                </button>
            </div>
        </div>
    </div>
</div>
