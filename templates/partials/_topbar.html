<nav class="portal-topbar d-flex align-items-center px-4">
    <button id="sidebarToggle"
            class="btn btn-link text-secondary p-0 me-3 d-lg-none border-0"
            type="button"
            aria-label="Toggle sidebar">
        <i class="bi bi-list fs-4"></i>
    </button>

    <a href="/" class="text-decoration-none me-auto me-lg-4">
        <span class="fw-bold fs-5" style="color: var(--portal-primary);">LeadPortal</span>
    </a>

    <span class="fw-semibold text-secondary d-none d-lg-block mx-auto">
        {{ page_title|default:"" }}
    </span>

    <div class="d-flex align-items-center gap-3 ms-auto">
        {% if user.is_authenticated %}
        <a href="#" class="text-secondary position-relative text-decoration-none" title="Notifications"
           id="notificationBell"
           hx-get="{% url 'notifications:unread_count' %}"
           hx-trigger="load, every 30s"
           hx-target="#notificationBadge"
           hx-swap="innerHTML">
            <i class="bi bi-bell-fill fs-5"></i>
            <span id="notificationBadge">
                {% include 'partials/_notification_badge.html' %}
            </span>
        </a>
        {% include 'partials/_user_dropdown.html' %}
        {% endif %}
    </div>
</nav>
