<header class="portal-topbar">

    <button class="topbar-hamburger" id="sidebarToggle" type="button" aria-label="Toggle menu">
        <i class="bi bi-list" style="font-size:1.2rem;"></i>
    </button>

    {% if page_title %}
    <h1 class="topbar-title d-none d-sm-block">{{ page_title }}</h1>
    {% endif %}

    <div class="topbar-spacer"></div>

    <div class="topbar-search d-none d-lg-flex">
        <i class="bi bi-search topbar-search-icon"></i>
        <input type="text" placeholder="Search anything...">
    </div>

    {% if user.is_authenticated %}
    <a class="topbar-icon-btn text-decoration-none" title="Notifications"
       id="notificationBell"
       hx-get="{% url 'notifications:unread_count' %}"
       hx-trigger="load, every 30s"
       hx-target="#notifBadgeWrap"
       hx-swap="innerHTML">
        <i class="bi bi-bell"></i>
        <span id="notifBadgeWrap"></span>
    </a>

    <div class="dropdown">
        <button class="topbar-user-btn" type="button"
                data-bs-toggle="dropdown" aria-expanded="false">
            <div class="topbar-user-avatar">
                {{ user.first_name|first|default:user.email|first|upper }}{{ user.last_name|first|upper }}
            </div>
            <span class="topbar-user-name">{{ user.get_full_name|default:user.email }}</span>
            <i class="bi bi-chevron-down d-none d-sm-block" style="font-size:0.6rem;color:var(--portal-text-muted);"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end mt-1" style="min-width:200px;">
            <li><span class="dropdown-item-text small text-muted px-3 py-1 d-block text-truncate">{{ user.email }}</span></li>
            <li><span class="dropdown-item-text px-3 pb-1">
                <span class="badge rounded-pill" style="background:var(--portal-primary);font-size:0.62rem;">{{ user.get_role_display }}</span>
            </span></li>
            <li><hr class="dropdown-divider my-1"></li>
            <li>
                <form method="post" action="/logout/">
                    {% csrf_token %}
                    <button type="submit" class="dropdown-item text-danger">
                        <i class="bi bi-box-arrow-right me-2"></i>Sign out
                    </button>
                </form>
            </li>
        </ul>
    </div>
    {% endif %}

</header>
